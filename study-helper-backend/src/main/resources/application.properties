server.port=8080
spring.application.name=study-helper-backend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/studyhelper?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# File Upload Configuration
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB
file.upload.path=./src/main/resources/uploads

aliyun.oss.enabled=false
aliyun.oss.endpoint=
aliyun.oss.bucket=
aliyun.oss.prefix=studyhelper/
aliyun.oss.secret-file=./config/aliyun-secret.json
