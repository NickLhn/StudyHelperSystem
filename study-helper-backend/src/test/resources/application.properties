spring.datasource.url=jdbc:h2:mem:studyhelper-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

file.upload.path=./target/test-uploads
aliyun.oss.enabled=false

admin.init.enabled=false
security.token.secret=test-only-secret
security.token.expiration-hours=24
